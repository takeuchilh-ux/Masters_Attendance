<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>MasuTa! スマホ打刻</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans JP', 'Inter', sans-serif;
    background: linear-gradient(135deg, #1e40af 0%, #0f172a 100%);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .card {
    background: #fff;
    border-radius: 24px;
    box-shadow: 0 8px 40px rgba(0,0,0,.25);
    padding: 28px 20px;
    width: 100%;
    max-width: 360px;
  }
  .logo-wrap { text-align: center; margin-bottom: 16px; }
  .logo-wrap img { width: 52px; height: 52px; object-fit: contain; }
  .logo-wrap h1 { font-size: 20px; font-weight: 700; color: #0f172a; margin-top: 6px; }
  .logo-wrap p  { font-size: 12px; color: #64748b; margin-top: 2px; }

  .clock-box { text-align: center; margin: 12px 0 20px; }
  .clock { font-size: 42px; font-weight: 700; letter-spacing: 2px; color: #0f172a; font-variant-numeric: tabular-nums; line-height: 1; }
  .date-str { font-size: 13px; color: #64748b; margin-top: 4px; }

  .field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
  .field label { font-size: 13px; font-weight: 600; color: #374151; }
  .field select, .field input {
    border: 1.5px solid #d1d5db;
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 16px;
    font-family: inherit;
    outline: none;
    background: #fff;
    -webkit-appearance: none;
    appearance: none;
  }
  .field select:focus, .field input:focus {
    border-color: #2563eb;
    box-shadow: 0 0 0 3px rgba(37,99,235,.15);
  }
  .field input[type="tel"] { letter-spacing: 6px; font-weight: 700; text-align: center; font-size: 22px; }

  .btn-row { display: flex; gap: 10px; margin-top: 8px; }
  .btn {
    flex: 1;
    padding: 16px 8px;
    border-radius: 14px;
    font-size: 17px;
    font-weight: 700;
    border: none;
    cursor: pointer;
    transition: opacity .15s, transform .1s;
  }
  .btn:active { transform: scale(.97); }
  .btn:disabled { opacity: .35; cursor: not-allowed; transform: none; }
  .btn-green { background: #16a34a; color: #fff; }
  .btn-red   { background: #dc2626; color: #fff; }

  .status-row { display: flex; gap: 8px; margin-bottom: 16px; }
  .chip {
    flex: 1;
    text-align: center;
    padding: 8px 4px;
    border-radius: 10px;
    font-size: 12px;
    font-weight: 600;
  }
  .chip-in   { background: #dcfce7; color: #16a34a; }
  .chip-out  { background: #fee2e2; color: #dc2626; }
  .chip-none { background: #f1f5f9; color: #94a3b8; }

  .msg {
    margin-top: 12px;
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    text-align: center;
  }
  .msg-ok   { background: #dcfce7; color: #15803d; }
  .msg-err  { background: #fef2f2; color: #dc2626; }

  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    background: #0f172a;
    color: #fff;
    padding: 12px 24px;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 600;
    animation: fadeup .3s ease;
    white-space: nowrap;
    z-index: 100;
  }
  @keyframes fadeup {
    from { opacity:0; transform: translateX(-50%) translateY(12px); }
    to   { opacity:1; transform: translateX(-50%) translateY(0); }
  }
  .foot { color: rgba(255,255,255,.4); font-size: 11px; text-align: center; margin-top: 16px; }
</style>
</head>
<body>
<div id="root"></div>
<div class="foot">© 2026 Masters Staff Inc.</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const SUPABASE_URL  = 'https://dzwsdmcffrubjimnrfyf.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR6d3NkbWNmZnJ1YmppbW5yZnlmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3MjkxODAsImV4cCI6MjA5NDMwNTE4MH0.VXEGijG64gi9TMWDhrvZE6qcs0ZnArbZRrquGbpN-Kg';
const supa = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
const mdb  = (t) => supa.schema('masuta').from(t);

const FUJISAWA_OFFICE_ID = '416ff2a2-76f6-4087-b1de-86e1412dfd0b';
const DOW = ['日','月','火','水','木','金','土'];

function localDateStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function useClock() {
  const [now, setNow] = useState(new Date());
  useEffect(() => {
    const t = setInterval(() => setNow(new Date()), 1000);
    return () => clearInterval(t);
  }, []);
  return now;
}

function App() {
  const [staff,    setStaff]    = useState([]);
  const [loading,  setLoading]  = useState(true);

  useEffect(() => {
    mdb('staff')
      .select('id, name, birth_mmdd, office_id')
      .eq('office_id', FUJISAWA_OFFICE_ID)
      .eq('is_active', true)
      .eq('is_worker', true)
      .order('sort_order')
      .order('name')
      .then(({ data }) => { setStaff(data || []); setLoading(false); });
  }, []);

  if (loading) return (
    <div className="card" style={{ textAlign:'center', padding:40 }}>
      <div style={{ color:'#64748b' }}>読み込み中...</div>
    </div>
  );

  return <PunchScreen staff={staff} />;
}

function PunchScreen({ staff }) {
  const now     = useClock();
  const today   = localDateStr();
  const [selectedId, setSelectedId] = useState('');
  const [birth,      setBirth]      = useState('');
  const [todayLog,   setTodayLog]   = useState({});
  const [msg,        setMsg]        = useState(null); // { text, ok }
  const [busy,       setBusy]       = useState(false);

  useEffect(() => { loadToday(); }, []);

  async function loadToday() {
    const { data } = await mdb('touch_logs')
      .select('staff_id, touch_type, touched_at')
      .eq('office_id', FUJISAWA_OFFICE_ID)
      .gte('touched_at', `${today}T00:00:00`)
      .lte('touched_at', `${today}T23:59:59`);
    const map = {};
    (data || []).forEach(t => {
      if (!map[t.staff_id]) map[t.staff_id] = { inTime: null, outTime: null };
      const hhmm = new Date(t.touched_at).toLocaleTimeString('ja-JP', { hour:'2-digit', minute:'2-digit', hour12:false });
      if (t.touch_type === 'in'  && !map[t.staff_id].inTime)  map[t.staff_id].inTime  = hhmm;
      if (t.touch_type === 'out')                              map[t.staff_id].outTime = hhmm;
    });
    setTodayLog(map);
  }

  async function punch(type) {
    setMsg(null);
    const sel = staff.find(s => s.id === selectedId);
    if (!sel) { setMsg({ text: 'スタッフを選択してください', ok: false }); return; }
    if (!birth || birth.length !== 4) { setMsg({ text: '生年月日（月日4桁）を入力してください', ok: false }); return; }
    if (sel.birth_mmdd !== birth) { setMsg({ text: '生年月日が一致しません', ok: false }); return; }

    const log = todayLog[selectedId] || {};
    if (type === 'in'  && log.inTime)  { setMsg({ text: '既に出勤打刻済みです', ok: false }); return; }
    if (type === 'out' && !log.inTime) { setMsg({ text: '出勤打刻がありません', ok: false }); return; }
    if (type === 'out' && log.outTime) { setMsg({ text: '既に退勤打刻済みです', ok: false }); return; }

    setBusy(true);
    const { error } = await mdb('touch_logs').insert({
      staff_id:   selectedId,
      office_id:  FUJISAWA_OFFICE_ID,
      touch_type: type,
      touched_at: new Date().toISOString(),
    });
    setBusy(false);

    if (error) { setMsg({ text: '打刻に失敗しました: ' + error.message, ok: false }); return; }

    const hhmm = new Date().toLocaleTimeString('ja-JP', { hour:'2-digit', minute:'2-digit', hour12:false });
    setTodayLog(prev => {
      const cur = prev[selectedId] || {};
      return { ...prev, [selectedId]: type === 'in' ? { ...cur, inTime: hhmm } : { ...cur, outTime: hhmm } };
    });
    setMsg({ text: `${sel.name} さんの${type === 'in' ? '出勤' : '退勤'}を記録しました（${hhmm}）`, ok: true });
    setBirth('');
  }

  const timeStr = now.toLocaleTimeString('ja-JP', { hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false });
  const d = new Date();
  const dateStr = `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${DOW[d.getDay()]}）`;

  const log = todayLog[selectedId] || {};

  return (
    <div className="card">
      <div className="logo-wrap">
        <img src="logo.png" alt="MasuTa!" />
        <h1>MasuTa! 打刻</h1>
        <p>藤沢事業所</p>
      </div>

      <div className="clock-box">
        <div className="clock">{timeStr}</div>
        <div className="date-str">{dateStr}</div>
      </div>

      <div className="field">
        <label>名前を選択</label>
        <select value={selectedId} onChange={e => { setSelectedId(e.target.value); setBirth(''); setMsg(null); }}>
          <option value="">— 選択してください —</option>
          {staff.map(s => (
            <option key={s.id} value={s.id}>{s.name}</option>
          ))}
        </select>
      </div>

      {selectedId && (
        <>
          <div className="status-row">
            <div className={`chip ${log.inTime ? 'chip-in' : 'chip-none'}`}>
              出勤<br /><strong>{log.inTime || '—'}</strong>
            </div>
            <div className={`chip ${log.outTime ? 'chip-out' : 'chip-none'}`}>
              退勤<br /><strong>{log.outTime || '—'}</strong>
            </div>
          </div>

          <div className="field">
            <label>生年月日（月日4桁）</label>
            <input
              type="tel"
              inputMode="numeric"
              maxLength={4}
              placeholder="0315"
              value={birth}
              onChange={e => { setBirth(e.target.value.replace(/\D/g,'').slice(0,4)); setMsg(null); }}
            />
          </div>

          <div className="btn-row">
            <button
              className="btn btn-green"
              onClick={() => punch('in')}
              disabled={busy || !!log.inTime}
            >🟢 出勤</button>
            <button
              className="btn btn-red"
              onClick={() => punch('out')}
              disabled={busy || !log.inTime || !!log.outTime}
            >🔴 退勤</button>
          </div>
        </>
      )}

      {msg && (
        <div className={`msg ${msg.ok ? 'msg-ok' : 'msg-err'}`}>{msg.text}</div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
